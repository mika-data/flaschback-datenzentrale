<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta author="Michael Cieslik">
    <title>{% block title %}Fläschbäck{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="bg-teal-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">Fläschbäck Datenzentrale</h1>
                <p class="text-xs opacity-90">Enterprise Administration</p>
            </div>
            <div>
                <a href="/api/v1/export" class="bg-white text-teal-700 font-semibold px-4 py-2 rounded shadow hover:bg-teal-50 transition">📦 ZIP Export</a>
            </div>
        </div>
    </header>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
