<body class="bg-gray-50 text-gray-800 min-h-screen">

    <header class="bg-teal-600 text-white shadow-md">

            <div>
                <h1 class="text-2xl font-bold tracking-wide">Fläschbäck</h1>
                <p class="text-xs opacity-90">Zentrale Dokumentations-Plattform & Beziehungs-Matrix</p>
            </div>
            <div class="flex items-center gap-3">
                <a href="/api/v1/export" class="bg-white text-teal-700 font-semibold px-4 py-2 rounded shadow hover:bg-teal-50 transition text-sm">
                    📦 Daten als ZIP exportieren
                </a>
                <button onclick="document.getElementById('importFile').click()" class="bg-white text-teal-700 font-semibold px-4 py-2 rounded shadow hover:bg-teal-50 transition text-sm cursor-pointer">
                    📥 Datenpaket importieren
                </button>
                <input type="file" id="importFile" accept=".json,.zip" class="hidden" onchange="triggerImport(event)">
            </div>
        </div>
    </header>

            <button onclick="switchMainTab('organisationen')" id="mainTab-organisationen" class="main-tab px-6 py-4 font-bold text-sm border-b-4 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">🏢 Organisationen</button>
            <button onclick="switchMainTab('ansprechpartner')" id="mainTab-ansprechpartner" class="main-tab px-6 py-4 font-bold text-sm border-b-4 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">👤 Ansprechpartner</button>
            <button onclick="switchMainTab('medienberichte')" id="mainTab-medienberichte" class="main-tab px-6 py-4 font-bold text-sm border-b-4 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">📰 Medienberichte</button>
            <button onclick="switchMainTab('marketing_colabs')" id="mainTab-marketing_colabs" class="main-tab px-6 py-4 font-bold text-sm border-b-4 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">📣 Marketing Co-Labs</button>
            <button onclick="switchMainTab('mediendateien')" id="mainTab-mediendateien" class="main-tab px-6 py-4 font-bold text-sm border-b-4 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">📸 Mediendateien</button>
    
        </div>
    </div>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}

    function triggerImport(event) {
        const file = event.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        fetch('/api/v1/import', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'Erfolg') {
                alert('✅ ' + data.nachricht);
                window.location.reload();
            } else {
                alert('❌ Fehler beim Import: ' + (data.fehler || 'Unbekannter Fehler'));
            }
        })
        .catch(error => {
            console.error('Fehler:', error);
            alert('❌ Netzwerkfehler beim Importieren.');
        })
        .finally(() => {
            document.getElementById('importFile').value = '';
        });
    }
